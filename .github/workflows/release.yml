name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconsole --name "tagexcel" --add-data "assets;assets" --hidden-import "PyQt6.QtCore" --hidden-import "PyQt6.QtGui" --hidden-import "PyQt6.QtWidgets" --hidden-import "PyQt6.QtWebEngineWidgets" --hidden-import "PyQt6.QtWebEngineCore" --hidden-import "pandas" --hidden-import "numpy" --hidden-import "openpyxl" --hidden-import "matplotlib" --hidden-import "requests" --hidden-import "python_calamine" --hidden-import "xlrd" main.py

      - name: Package portable build
        run: Compress-Archive -Path "dist\tagexcel\*" -DestinationPath "dist\tagexcel-${{ github.ref_name }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tagexcel-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
